<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выбрать геопозицию</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            z-index: 1000;
            flex-shrink: 0;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .header-text h1 {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        .header-text p {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 1px;
        }

        /* Search */
        .search-container {
            padding: 10px 16px 8px;
            background: #0f0f1a;
            flex-shrink: 0;
            z-index: 999;
        }

        .search-box {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 10px 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.35);
        }

        .search-input:focus {
            border-color: rgba(102, 126, 234, 0.6);
            background: rgba(102, 126, 234, 0.08);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .locate-btn {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            flex-shrink: 0;
        }

        .locate-btn:active {
            transform: scale(0.93);
        }

        /* Map */
        #map {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        /* Crosshair overlay */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .crosshair-pin {
            font-size: 36px;
            line-height: 1;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            animation: bounce 1.5s ease-in-out infinite;
        }

        .crosshair-shadow {
            width: 12px;
            height: 4px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            margin-top: -2px;
            animation: shadow-pulse 1.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @keyframes shadow-pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(0.7); opacity: 0.15; }
        }

        /* Info panel */
        .info-panel {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 12px 16px;
            flex-shrink: 0;
            z-index: 1000;
        }

        .coords-display {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .coords-icon {
            font-size: 20px;
        }

        .coords-text {
            flex: 1;
        }

        .coords-label {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .coords-value {
            font-size: 14px;
            font-weight: 600;
            color: #a78bfa;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
        }

        /* Confirm button */
        .confirm-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .confirm-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }

        .confirm-btn:disabled {
            background: rgba(255,255,255,0.1);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Map styles override */
        .leaflet-container {
            background: #1a1a2e;
        }

        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
        }

        .leaflet-control-zoom a {
            background: #1e1e35 !important;
            color: #a78bfa !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            width: 34px !important;
            height: 34px !important;
            line-height: 34px !important;
            font-size: 18px !important;
        }

        .leaflet-control-zoom a:hover {
            background: #2a2a4a !important;
        }

        /* Address tooltip */
        .address-tag {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            max-width: 90%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .address-tag.visible {
            opacity: 1;
        }

        /* Loading spinner */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15,15,26,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .loading-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Map wrapper */
        .map-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-icon">🗺️</div>
        <div class="header-text">
            <h1>Выбрать геопозицию</h1>
            <p>Листайте карту и выберите точку</p>
        </div>
    </div>

    <!-- Search -->
    <div class="search-container">
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск города или адреса..." />
            <button class="locate-btn" onclick="locateMe()" title="Моё местоположение">📍</button>
        </div>
    </div>

    <!-- Map -->
    <div class="map-wrapper">
        <div id="map"></div>

        <!-- Crosshair -->
        <div class="crosshair">
            <div class="crosshair-pin">📍</div>
            <div class="crosshair-shadow"></div>
        </div>

        <!-- Address tag -->
        <div class="address-tag" id="addressTag">Двигайте карту...</div>

        <!-- Loading -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel">
        <div class="coords-display">
            <div class="coords-icon">🌍</div>
            <div class="coords-text">
                <div class="coords-label">Выбранные координаты</div>
                <div class="coords-value" id="coordsDisplay">Переместите карту на нужное место</div>
            </div>
        </div>
        <button class="confirm-btn" id="confirmBtn" onclick="confirmLocation()">
            ✅ Подтвердить геопозицию
        </button>
    </div>

    <script>
        // Telegram WebApp init
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let selectedLat = null;
        let selectedLon = null;
        let geocodeTimer = null;
        const addressTag = document.getElementById('addressTag');

        // Init map — центр по умолчанию
        const defaultLat = 55.7558;
        const defaultLon = 37.6173;

        const map = L.map('map', {
            center: [defaultLat, defaultLon],
            zoom: 12,
            zoomControl: true,
            attributionControl: false
        });

        // Тёмная тема карты
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Атрибуция компактная
        L.control.attribution({ prefix: '' }).addTo(map);

        // Обновляем координаты при движении карты
        function updateCoords() {
            const center = map.getCenter();
            selectedLat = center.lat.toFixed(6);
            selectedLon = center.lng.toFixed(6);

            document.getElementById('coordsDisplay').textContent = `${selectedLat}, ${selectedLon}`;

            // Reverse geocode с задержкой
            clearTimeout(geocodeTimer);
            geocodeTimer = setTimeout(() => reverseGeocode(center.lat, center.lng), 600);
        }

        map.on('move', updateCoords);
        map.on('movestart', () => {
            addressTag.classList.remove('visible');
        });

        // Начальные координаты
        updateCoords();

        // Reverse geocoding
        async function reverseGeocode(lat, lon) {
            try {
                const res = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ru`,
                    { headers: { 'Accept-Language': 'ru' } }
                );
                const data = await res.json();
                if (data && data.display_name) {
                    // Берём только первые 2 части адреса
                    const parts = data.display_name.split(',').slice(0, 2).join(',').trim();
                    addressTag.textContent = '📍 ' + parts;
                    addressTag.classList.add('visible');
                    setTimeout(() => addressTag.classList.remove('visible'), 3000);
                }
            } catch (e) {
                // Тихо игнорируем ошибки геокодинга
            }
        }

        // Поиск адреса
        const searchInput = document.getElementById('searchInput');
        let searchTimer = null;

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                searchAddress(searchInput.value);
            }
        });

        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            const val = searchInput.value.trim();
            if (val.length > 3) {
                searchTimer = setTimeout(() => searchAddress(val), 800);
            }
        });

        async function searchAddress(query) {
            if (!query.trim()) return;
            showLoading(true);
            try {
                const res = await fetch(
                    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&accept-language=ru`
                );
                const data = await res.json();
                if (data && data.length > 0) {
                    const { lat, lon, display_name } = data[0];
                    map.flyTo([parseFloat(lat), parseFloat(lon)], 15, { duration: 1.2 });
                    addressTag.textContent = '📍 ' + display_name.split(',').slice(0,2).join(',');
                    addressTag.classList.add('visible');
                    setTimeout(() => addressTag.classList.remove('visible'), 4000);
                } else {
                    addressTag.textContent = '❌ Место не найдено';
                    addressTag.classList.add('visible');
                    setTimeout(() => addressTag.classList.remove('visible'), 2000);
                }
            } catch (e) {
                addressTag.textContent = '❌ Ошибка поиска';
                addressTag.classList.add('visible');
                setTimeout(() => addressTag.classList.remove('visible'), 2000);
            }
            showLoading(false);
        }

        // Моё местоположение
        function locateMe() {
            showLoading(true);
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        map.flyTo([pos.coords.latitude, pos.coords.longitude], 16, { duration: 1.2 });
                        showLoading(false);
                    },
                    (err) => {
                        showLoading(false);
                        addressTag.textContent = '❌ Не удалось получить геопозицию';
                        addressTag.classList.add('visible');
                        setTimeout(() => addressTag.classList.remove('visible'), 2000);
                    },
                    { timeout: 8000, enableHighAccuracy: true }
                );
            } else {
                showLoading(false);
            }
        }

        // Подтверждение
        function confirmLocation() {
            if (!selectedLat || !selectedLon) return;

            const data = JSON.stringify({
                latitude: parseFloat(selectedLat),
                longitude: parseFloat(selectedLon)
            });

            // Отправляем данные в бот
            tg.sendData(data);
        }

        // Loading
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.toggle('show', show);
        }
    </script>
</body>
</html>
