<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мини-приложение Telegram</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="app-shell">
    <h1>Отправить новость</h1>

    <div class="notice">Здесь можно добавить текст, фото, видео и геопозицию. Откройте приложение из Telegram.</div>

    <form id="news-form">
      <label for="text">Текст новости</label>
      <textarea id="text" name="text" placeholder="Введите текст..." rows="6"></textarea>

      <label for="files">Фото / видео</label>
      <input id="files" name="files" type="file" multiple accept="image/*,video/*">

      <div class="location-row">
        <button type="button" id="geo-button">Добавить геопозицию</button>
        <span id="geo-status">Геопозиция не задана</span>
      </div>

      <div class="submit-row">
        <button type="submit">Отправить на модерацию</button>
      </div>
    </form>

    <div id="status"></div>

    <input type="hidden" id="user_id" name="user_id">
    <input type="hidden" id="username" name="username">
    <input type="hidden" id="lat" name="lat">
    <input type="hidden" id="lon" name="lon">
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
